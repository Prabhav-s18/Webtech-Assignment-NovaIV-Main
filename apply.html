<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Form</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #222;
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }

    h1, h2 {
      margin-top: 0;
      color: #1e3a5f;
    }

    .intro {
      background: #eef4fb;
      border-left: 5px solid #1e3a5f;
      padding: 16px;
      margin-bottom: 24px;
      border-radius: 6px;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    label, legend {
      font-weight: bold;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 1rem;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    fieldset {
      border: 1px solid #bbb;
      border-radius: 8px;
      padding: 14px;
    }

    .inline-options {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 8px;
    }

    .inline-options label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .skills-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .skills-group label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    button {
      background: #1e3a5f;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #16314f;
    }

    .note {
      font-size: 0.95rem;
      color: #555;
    }

    @media (min-width: 700px) {
      .two-column {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Job Application Form</h1>

    <div class="intro">
      <h2>E-Commerce &amp; Digital Retail Platform</h2>
      <p>
        An online retail platform expanding its technical and user experience teams
        to enhance customer-facing websites, product listings, and online application workflows.
      </p>
    </div>

    <form action="https://mercury.swin.edu.au/it000000/formtest.php" method="post" novalidate>
      <div class="form-group">
        <label for="jobRef">Job Reference Number</label>
        <input
          type="text"
          id="jobRef"
          name="jobRef"
          required
          maxlength="5"
          pattern="[A-Za-z0-9]{5}"
          title="Exactly 5 alphanumeric characters"
          placeholder="e.g. A1B2C"
        />
      </div>

      <div class="two-column">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input
            type="text"
            id="firstName"
            name="firstName"
            required
            maxlength="20"
            pattern="[A-Za-z]{1,20}"
            title="Only alphabetic characters, maximum 20"
            placeholder="Enter first name"
          />
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input
            type="text"
            id="lastName"
            name="lastName"
            required
            maxlength="20"
            pattern="[A-Za-z]{1,20}"
            title="Only alphabetic characters, maximum 20"
            placeholder="Enter last name"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="dob">Date of Birth</label>
        <input
          type="text"
          id="dob"
          name="dob"
          required
          pattern="(0[1-9]|[12][0-9]|3[01])\/(0[1-9]|1[0-2])\/([0-9]{4})"
          title="Format must be dd/mm/yyyy"
          placeholder="dd/mm/yyyy"
          inputmode="numeric"
        />
      </div>

      <fieldset>
        <legend>Gender</legend>
        <div class="inline-options">
          <label for="male">
            <input type="radio" id="male" name="gender" value="Male" required />
            Male
          </label>

          <label for="female">
            <input type="radio" id="female" name="gender" value="Female" />
            Female
          </label>

          <label for="other">
            <input type="radio" id="other" name="gender" value="Other" />
            Other
          </label>
        </div>
      </fieldset>

      <div class="form-group">
        <label for="streetAddress">Street Address</label>
        <input
          type="text"
          id="streetAddress"
          name="streetAddress"
          required
          maxlength="40"
          placeholder="Enter street address"
        />
      </div>

      <div class="two-column">
        <div class="form-group">
          <label for="suburb">Suburb/Town</label>
          <input
            type="text"
            id="suburb"
            name="suburb"
            required
            maxlength="40"
            placeholder="Enter suburb or town"
          />
        </div>

        <div class="form-group">
          <label for="state">State</label>
          <select id="state" name="state" required>
            <option value="">Select a state</option>
            <option value="VIC">VIC</option>
            <option value="NSW">NSW</option>
            <option value="QLD">QLD</option>
            <option value="NT">NT</option>
            <option value="WA">WA</option>
            <option value="SA">SA</option>
            <option value="TAS">TAS</option>
            <option value="ACT">ACT</option>
          </select>
        </div>
      </div>

      <div class="two-column">
        <div class="form-group">
          <label for="postcode">Postcode</label>
          <input
            type="text"
            id="postcode"
            name="postcode"
            required
            pattern="[0-9]{4}"
            maxlength="4"
            title="Exactly 4 digits"
            placeholder="e.g. 3000"
            inputmode="numeric"
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="Enter email address"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          required
          pattern="[0-9]{8,12}"
          title="Phone number must be 8 to 12 digits"
          placeholder="8 to 12 digits"
          inputmode="numeric"
        />
      </div>

      <fieldset>
        <legend>Skill List</legend>
        <div class="skills-group">
          <label for="html">
            <input type="checkbox" id="html" name="skills[]" value="HTML" required />
            HTML
          </label>

          <label for="css">
            <input type="checkbox" id="css" name="skills[]" value="CSS" />
            CSS
          </label>

          <label for="javascript">
            <input type="checkbox" id="javascript" name="skills[]" value="JavaScript" />
            JavaScript
          </label>

          <label for="ux">
            <input type="checkbox" id="ux" name="skills[]" value="UX Design" />
            UX Design
          </label>

          <label for="seo">
            <input type="checkbox" id="seo" name="skills[]" value="SEO" />
            SEO
          </label>
        </div>
        <p class="note">Select at least one skill.</p>
      </fieldset>

      <div class="form-group">
        <label for="otherSkills">Other Skills</label>
        <textarea
          id="otherSkills"
          name="otherSkills"
          placeholder="Enter any additional skills here"
        ></textarea>
      </div>

      <button type="submit">Apply Now</button>
    </form>
  </div>
</body>
</html>
